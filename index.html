<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nini Blendz | Vaughan Ontario</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0d0d0d;
  color:white;
}

header{
  background:black;
  padding:25px;
  text-align:center;
  font-size:26px;
  font-weight:700;
  letter-spacing:4px;
  color:#d4af37;
}

nav{
  text-align:center;
  padding:15px;
  background:#111;
}

nav a{
  color:#d4af37;
  text-decoration:none;
  margin:0 20px;
  font-weight:500;
}

nav a:hover{
  color:white;
}

.hero{
  height:90vh;
  background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
  url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:65px;
  color:#d4af37;
}

section{
  padding:80px 20px;
  text-align:center;
}

h2{
  color:#d4af37;
  margin-bottom:40px;
}

.card{
  background:#111;
  border:1px solid #d4af37;
  padding:40px;
  width:280px;
  margin:auto;
  border-radius:12px;
}

.price{
  margin-top:20px;
  font-weight:700;
  font-size:22px;
  color:#d4af37;
}

form{
  max-width:500px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input{
  padding:12px;
  background:#111;
  border:1px solid #d4af37;
  color:white;
  border-radius:6px;
}

button{
  padding:14px;
  background:#d4af37;
  border:none;
  font-weight:700;
  cursor:pointer;
  border-radius:6px;
}

button:hover{
  background:white;
}

.phone-btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 25px;
  background:#d4af37;
  color:black;
  text-decoration:none;
  font-weight:700;
  border-radius:6px;
}

.phone-btn:hover{
  background:white;
}

footer{
  background:black;
  padding:25px;
  font-size:14px;
  margin-top:40px;
}

@media(max-width:768px){
  .hero h1{
    font-size:38px;
  }
}

</style>
</head>

<body>

<header>
NINI BLENDZ 💈 | VAUGHAN ONTARIO
</header>

<nav>
<a href="#services">Service</a>
<a href="#booking">Book</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero">
<h1>Fire Cut 🔥</h1>
</div>

<section id="services">
<h2>Premium Service</h2>

<div class="card">
<h3>Fire Cut</h3>
<p>Clean fade. Sharp lineup. Precision finish.</p>
<div class="price">$10</div>
</div>

</section>

<section id="booking">
<h2>Book Appointment (Monday–Friday Only)</h2>

<form id="bookingForm">

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email Address" required>
<input type="date" id="datePicker" required>
<input type="time" required>

<button type="submit">Reserve Your Spot</button>

</form>

<p id="message" style="margin-top:20px;color:#d4af37;"></p>

</section>

<section id="contact">
<h2>Contact Nini Blendz</h2>

<p>📍 Vaughan, Ontario</p>
<p>📞 437-660-0452</p>

<a class="phone-btn" href="tel:4376600452">Call Now</a>

</section>

<footer>
© 2026 Nini Blendz | Modern Grooming
</footer>

<script>

const form = document.getElementById('bookingForm');
const message = document.getElementById('message');

form.addEventListener('submit', function(e){

const dateInput = document.getElementById('datePicker').value;
const selectedDate = new Date(dateInput);
const day = selectedDate.getDay();

if(day === 0 || day === 6){
e.preventDefault();
message.textContent = "Appointments are Monday to Friday only.";
}else{
e.preventDefault();
message.textContent = "Booking request submitted. We will contact you to confirm.";
form.reset();
}

});

</script>

</body>
</html>
